services:
  - type: web
    name: studymind-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false         
      - key: MONGO_URI
        sync: false          
      - key: SECRET_KEY
        generateValue: true  